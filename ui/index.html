<title>MalariaChat — Rwanda CHW assistant</title>
<style>
  :root {
    --bg:           #0e1218;
    --panel:        #161c24;
    --panel-soft:   #1c2530;
    --border:       #2a3340;
    --text:         #d8dee6;
    --muted:        #8b96a4;
    --accent:       #4ad79a;
    --accent-soft:  rgba(74, 215, 154, 0.10);
    --warn:         #f4b152;
    --danger:       #ee5a5a;
    --info:         #4a8aff;
    --info-soft:    rgba(74, 138, 255, 0.10);
    --code-bg:      #0a0d12;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    display: flex;
    flex-direction: row;
  }
  .chat-column {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  aside.chats-panel {
    flex: 0 0 260px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  aside.chats-panel .new-chat-btn {
    margin: 14px 14px 10px;
    padding: 10px 14px;
    background: var(--accent-soft);
    color: var(--accent);
    border: 1px solid rgba(74, 215, 154, 0.30);
    border-radius: 8px;
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
  }
  aside.chats-panel .new-chat-btn:hover {
    background: rgba(74, 215, 154, 0.18);
  }
  aside.chats-panel .chats-list-area {
    flex: 1 1 auto;
    overflow-y: auto;

<script>
// ── State ──────────────────────────────────────────────────────────────────
let conversationId = null;
let activeLang     = 'en';
let sending        = false;
let chatsList      = [];    // Cached result of the last /v1/chats fetch.

// activeConversationId is persisted to localStorage so a page reload
// reopens the same chat. This is a separate key from settings — the
// settings change rarely, the active chat changes constantly.
const ACTIVE_CONV_KEY = 'malariaChat.activeConversationId.v1';

function setActiveConversation(id) {
  conversationId = id || null;
  try {
    if (conversationId) localStorage.setItem(ACTIVE_CONV_KEY, conversationId);
    else                localStorage.removeItem(ACTIVE_CONV_KEY);
  } catch (e) { /* ignore */ }
  highlightActiveChat();
}

// Settings (Settings modal — gear icon at bottom-left of the chats
// sidebar). Persisted to localStorage and sent with every /v1/chat
// POST. country='RW' is the only supported value; anything else
// triggers the "not supported yet" UX and the server-side short-circuit.
const SETTINGS_KEY_V1 = 'malariaChat.settings.v1';
const SETTINGS_KEY_V2 = 'malariaChat.settings.v2';
let settings = { userName: '', email: '', phone: '', country: 'RW', district: '', lang: 'en' };

// modalPending: snapshot of settings while the modal is open. All
// modal-field changes update modalPending; Save commits to settings,
// Cancel discards. Null when modal is closed.
let modalPending = null;

function loadSettings() {
  try {
    const rawV2 = localStorage.getItem(SETTINGS_KEY_V2);
    if (rawV2) {
      applyParsedSettings(JSON.parse(rawV2));
    } else {
      // v1 migration: read v1 and write v2 once, so the user keeps
      // their previously-saved name/country/district/lang.
      const rawV1 = localStorage.getItem(SETTINGS_KEY_V1);
      if (rawV1) {
        applyParsedSettings(JSON.parse(rawV1));
        saveSettings();
      }
    }
  } catch (e) { /* ignore corrupt storage; defaults apply */ }
  // Enforce country↔language constraints at load time, so a user
  // who previously saved {country: UG, lang: sw} or {country: BI,
  // lang: en} doesn't see a half-working UI on the next visit.
  if (isEnglishOnlyCountry(settings.country) && settings.lang !== 'en') {
    settings.lang = 'en';
  } else if (isFrenchOnlyCountry(settings.country) && settings.lang !== 'fr') {
    settings.lang = 'fr';
  }
  activeLang = settings.lang;
}

function applyParsedSettings(p) {
  if (!p || typeof p !== 'object') return;
  if (typeof p.userName === 'string') settings.userName = p.userName;
  if (typeof p.email    === 'string') settings.email    = p.email;
  if (typeof p.phone    === 'string') settings.phone    = p.phone;
  if (typeof p.country  === 'string') settings.country  = p.country;
  if (typeof p.district === 'string') settings.district = p.district;
  if (p.lang === 'en' || p.lang === 'rw' || p.lang === 'sw' || p.lang === 'fr') settings.lang = p.lang;
}

function saveSettings() {
  try { localStorage.setItem(SETTINGS_KEY_V2, JSON.stringify(settings)); }
  catch (e) { /* quota or disabled storage — keep going in memory */ }
}

  en: { RW: 'Rwanda', BI: 'Burundi', CD: 'DRC', KE: 'Kenya', TZ: 'Tanzania', UG: 'Uganda', ZM: 'Zambia' },
  rw: { RW: 'u Rwanda', BI: 'Uburundi', CD: 'Repubulika Iharanira Demokarasi ya Kongo', KE: 'Kenya', TZ: 'Tanzaniya', UG: 'Uganda', ZM: 'Zambiya' },
  sw: { RW: 'Rwanda', BI: 'Burundi', CD: 'Jamhuri ya Kidemokrasia ya Kongo', KE: 'Kenya', TZ: 'Tanzania', UG: 'Uganda', ZM: 'Zambia' },
  fr: { RW: 'Rwanda', BI: 'Burundi', CD: 'République Démocratique du Congo', KE: 'Kenya', TZ: 'Tanzanie', UG: 'Ouganda', ZM: 'Zambie' },
};

// ── Helpers ────────────────────────────────────────────────────────────────
function $(id) { return document.getElementById(id); }
function L() { return LABELS[activeLang] || LABELS.en; }
// Phase A: all seven countries are chat-enabled. RW runs the full
// RBC 2024 production protocol; the other six run the WHO 2024
// teaching baseline. Within teaching mode, language coverage
// varies (see isEnglishOnlyCountry and isFrenchOnlyCountry).
function isSupportedCountry(c) {
  return c === 'RW' || c === 'TZ' || c === 'KE' || c === 'UG' || c === 'ZM'
      || c === 'BI' || c === 'CD';
}
// Uganda and Zambia ship in English only. No Swahili / Kinyarwanda /
// French labels for those audiences in Phase A.
function isEnglishOnlyCountry(c) {
  return c === 'UG' || c === 'ZM';
}
// Burundi and DRC ship in French only. No English / Swahili /
// Kinyarwanda labels for those audiences.
function isFrenchOnlyCountry(c) {
  return c === 'BI' || c === 'CD';
}
function escapeHtml(s) {
  return (s ?? '').toString()
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ── Rendering ──────────────────────────────────────────────────────────────
// renderStaticLabels — non-modal text. The Settings modal has its own
// label renderer (renderModalLabels) keyed on modalPending.lang while
// the modal is open, so a language switch inside the modal previews
// before commit.
function renderStaticLabels() {
  const t = L();
  // Header subtitle and review banner are country-aware: Rwanda uses
  // the production "CHW assistant / PROTOCOL_REVIEW_REQUIRED" framing;
  // Tanzania/Kenya use the teaching-mode / WHO 2024 framing with the
  // country name interpolated.
  const isRwandaMode = settings.country === 'RW';
  const cName = (COUNTRY_DISPLAY[activeLang] && COUNTRY_DISPLAY[activeLang][settings.country]) || settings.country;
  $('headerSub').textContent          = isRwandaMode
    ? t.headerSub
    : (t.headerSubTeaching || t.headerSub).replace(/\{country\}/g, cName);
  $('sendBtn').textContent            = t.sendBtn;
  $('reviewBanner').innerHTML         = isRwandaMode
    ? t.reviewBanner
    : (t.reviewBannerTeaching || t.reviewBanner).replace(/\{country\}/g, cName);
  $('welcomeTitle').textContent       = t.welcomeTitle;
  $('welcomeBody').innerHTML          = isRwandaMode
    ? t.welcomeBody
    : (t.welcomeBodyTeaching || t.welcomeBody);
  $('welcomeExamples').innerHTML      = isRwandaMode
    ? t.welcomeExamples
    : (t.welcomeExamplesTeaching || t.welcomeExamples);
  $('newChatBtn').textContent         = t.newChatBtn;
  $('settingsBtnLabel').textContent   = t.settingsBtnLabel;
  // The chats list area renders its own contents (placeholder text OR
  // row list) via fetchChatsList — re-fetch here so the language
  // change is reflected in the placeholder text.
  fetchChatsList();
  refreshCountryUx();
}

// refreshCountryUx — toggles chat input enable based on the committed
// (settings.country) value. Does NOT touch the country-warn DIV — that
// lives inside the Settings modal and is managed by refreshModalCountryWarn.
function refreshCountryUx() {
  const t = L();
  const supported = isSupportedCountry(settings.country);
  const inputEl   = $('messageInput');
  const btnEl     = $('sendBtn');
  if (supported) {
    inputEl.disabled    = false;
    // Drop the "Kayonza, …" example for non-Rwanda teaching countries;
    // Kayonza is meaningless when the user is in TZ/KE/UG/ZM mode.
    inputEl.placeholder = (settings.country === 'RW')
      ? t.placeholder
      : (t.placeholderTeaching || t.placeholder);
    btnEl.disabled      = sending;
  } else {
    inputEl.disabled    = true;
    inputEl.placeholder = t.inputDisabledPh;
    btnEl.disabled      = true;
  }
}

// ── Chats sidebar ───────────────────────────────────────────────────────────
//
// fetchChatsList: hits GET /v1/chats?email=... and renders the result
// into #chatsListArea. Bails to the no-email placeholder when settings
// has no email yet; bails to the empty placeholder when the user has
// never chatted before. Cached as chatsList so highlightActiveChat /
// openChat don't re-fetch unnecessarily.
async function fetchChatsList() {
  const t    = L();
  const area = $('chatsListArea');
  if (!settings.email) {
    chatsList = [];
    area.innerHTML = '';
    area.appendChild(makePlaceholder(t.chatsListNoEmail));
    return;
  }
  try {
    const resp = await fetch('/v1/chats'
      + '?email=' + encodeURIComponent(settings.email)
      + '&country=' + encodeURIComponent(settings.country || 'RW'));
    if (!resp.ok) {
      chatsList = [];
      area.innerHTML = '';
      area.appendChild(makePlaceholder(t.networkError + ' (HTTP ' + resp.status + ')'));
      return;
    }
    const data = await resp.json();
    chatsList = data.chats || [];
    renderChatsList();
  } catch (e) {
    chatsList = [];
    area.innerHTML = '';
    area.appendChild(makePlaceholder(t.networkError));
  }
}

function makePlaceholder(text) {
  const div = document.createElement('div');
  div.className = 'chats-list-placeholder';
  div.id = 'chatsListPlaceholder';
  div.textContent = text;
  return div;
}

function renderChatsList() {
  const t    = L();
  const area = $('chatsListArea');
  area.innerHTML = '';
  if (chatsList.length === 0) {
    area.appendChild(makePlaceholder(t.chatsListEmpty));
    return;
  }
  chatsList.forEach(c => {
    const row = document.createElement('div');
    row.className = 'chat-row';
    if (c.conversationId === conversationId) row.classList.add('active');
    row.dataset.conversationId = c.conversationId;

    const title = document.createElement('div');
    title.className = 'chat-row-title';
    title.textContent = (c.title && c.title.length > 0) ? c.title : t.chatRowUntitled;
    row.appendChild(title);

    const meta = document.createElement('div');
    meta.className = 'chat-row-meta';
    meta.textContent = formatChatTimestamp(c.lastActivityAt) + ' · ' + c.messageCount;
    row.appendChild(meta);

    row.addEventListener('click', () => openChat(c.conversationId));
    area.appendChild(row);
  });
}

function highlightActiveChat() {
  document.querySelectorAll('.chat-row').forEach(r => {
    r.classList.toggle('active', r.dataset.conversationId === conversationId);
  });
}

// formatChatTimestamp: Postgres emits "YYYY-MM-DDTHH:MM:SS" (no zone).
// new Date() parses it as local time. We render same-day chats as
// HH:MM and older chats as a short date.
function formatChatTimestamp(s) {
  if (!s) return '';
  const d = new Date(s);
  if (isNaN(d.getTime())) return s;
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  if (sameDay) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  return d.toLocaleDateString();
}

// openChat: load /v1/chat-history for a conversation id and replay
// every message back into the thread. Called from the chat-row click
// handler and from the page-load resume path.
async function openChat(convId) {
  if (!convId) return;
  // Note: no early-return based on `convId === conversationId`. The
  // welcome empty-state IS a child of #thread on page load, so the
  // previous "already open" check (`thread.children.length > 0`)
  // matched even when the actual chat hadn't been replayed yet.
  // Refetching costs one cheap GET per click; the simplicity is
  // worth more than the avoided round-trip.
  const t = L();
  try {
    const resp = await fetch('/v1/chat-history?conversationId=' + encodeURIComponent(convId));
    if (!resp.ok) {
      appendErrorBubble(t.networkError + ' (HTTP ' + resp.status + ')');
      return;
    }
    const data = await resp.json();
    replayMessages(data.messages || []);
    setActiveConversation(convId);
  } catch (e) {
    appendErrorBubble(t.networkError);
  }
}

// replayMessages: clear the thread and render each persisted message
// using the same bubble renderers the live chat path uses, so a
// reloaded conversation looks identical to the live one.
function replayMessages(messages) {
  const thread = $('thread');
  thread.innerHTML = '';
  if (messages.length === 0) {
    // No turns yet — restore welcome state.
    clearThreadAndShowWelcome();
    return;
  }
  messages.forEach(m => {
    if (m.role === 'user') {
      appendUserBubble(m.text);
    } else if (m.role === 'assistant') {
      appendAssistantBubble({
        assistantText:      m.text,
        intent:             m.intent || 'open',
        structured:         m.structured || null,
        structuredEndpoint: m.structuredEndpoint || null,
        llmOnline:          true,
      });
    }
  });
}

function clearThreadAndShowWelcome() {
  const thread = $('thread');
  thread.innerHTML = '';
  const empty = document.createElement('div');
  empty.className = 'empty-state';
  empty.id = 'emptyState';
  const t = L();
  // Country-aware welcome body + examples (matches renderStaticLabels):
  // Rwanda keeps the production text (mentions district first-line +
  // Kayonza); TZ/KE use the teaching variants (drop district + Kayonza).
  const isRwandaMode = settings.country === 'RW';
  const body     = isRwandaMode ? t.welcomeBody     : (t.welcomeBodyTeaching     || t.welcomeBody);
  const examples = isRwandaMode ? t.welcomeExamples : (t.welcomeExamplesTeaching || t.welcomeExamples);
  empty.innerHTML = `<h2 id="welcomeTitle">${escapeHtml(t.welcomeTitle)}</h2>`
                  + `<div id="welcomeBody">${body}</div>`
                  + `<div class="examples" id="welcomeExamples">${examples}</div>`;
  thread.appendChild(empty);
}

// ── Settings modal ──────────────────────────────────────────────────────────
function isValidEmail(s) {
  if (!s || s.length === 0) return false;
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s);
}

function openSettingsModal() {
  // Snapshot current settings into modalPending so edits can be discarded.
  modalPending = { ...settings };
  hydrateModalInputs(modalPending);
  renderModalLabels(modalPending.lang);
  refreshModalCountryWarn();
  clearEmailError();
  $('settingsModalBackdrop').style.display = '';
  // Focus first field for keyboard users.
  setTimeout(() => $('settingName').focus(), 0);
}

function closeSettingsModal() {
  modalPending = null;
  $('settingsModalBackdrop').style.display = 'none';
}

function hydrateModalInputs(p) {
  $('settingName').value     = p.userName;
  $('settingEmail').value    = p.email;
  $('settingPhone').value    = p.phone;
  $('settingCountry').value  = p.country;
  $('settingDistrict').value = p.district;
  document.querySelectorAll('#settingsModal .lang-pill').forEach(el => {
    el.classList.toggle('active', el.dataset.lang === p.lang);
  });
}

// Country dropdown option labels are LANGUAGE-DEPENDENT in two ways:
//   - the country name itself (Tanzania / Tanzanie / Tanzaniya)
//   - the trailing helper text (teaching mode + language restriction)
// We rebuild the option text on every modal-label render so a lang
// switch inside the modal updates the dropdown text too.
const COUNTRY_DROPDOWN_NAME = {
  en: { RW:'Rwanda', BI:'Burundi', CD:'DRC',  KE:'Kenya', TZ:'Tanzania', UG:'Uganda',  ZM:'Zambia' },
  fr: { RW:'Rwanda', BI:'Burundi', CD:'RDC',  KE:'Kenya', TZ:'Tanzanie', UG:'Ouganda', ZM:'Zambie' },
  rw: { RW:'Rwanda', BI:'Uburundi',CD:'RDC',  KE:'Kenya', TZ:'Tanzaniya',UG:'Uganda',  ZM:'Zambiya'},
  sw: { RW:'Rwanda', BI:'Burundi', CD:'DRC',  KE:'Kenya', TZ:'Tanzania', UG:'Uganda',  ZM:'Zambia' },
};
const COUNTRY_DROPDOWN_SUFFIX = {
  en: { teaching: ' (teaching)',
        englishOnly: ' (teaching, English only)',
        frenchOnly:  ' (teaching, French only)' },
  fr: { teaching: ' (mode enseignement)',
        englishOnly: ' (mode enseignement, langue : Anglais)',
        frenchOnly:  ' (mode enseignement, langue : Français)' },
  rw: { teaching:    " (uburyo bw'inyigisho)",
        englishOnly: " (uburyo bw'inyigisho, ururimi: Icyongereza)",
        frenchOnly:  " (uburyo bw'inyigisho, ururimi: Igifaransa)" },
  sw: { teaching:    ' (hali ya kufundisha)',
        englishOnly: ' (hali ya kufundisha, lugha: Kiingereza)',
        frenchOnly:  ' (hali ya kufundisha, lugha: Kifaransa)' },
};
function refreshCountryDropdownLabels(lang) {
  const names    = COUNTRY_DROPDOWN_NAME[lang]   || COUNTRY_DROPDOWN_NAME.en;
  const suffixes = COUNTRY_DROPDOWN_SUFFIX[lang] || COUNTRY_DROPDOWN_SUFFIX.en;
  const sel = $('settingCountry');
  for (const opt of sel.options) {
    const code = opt.value;
    if (!code) continue;
    const name = names[code] || code;
    let suffix;
    if (code === 'RW')                              suffix = '';
    else if (code === 'UG' || code === 'ZM')        suffix = suffixes.englishOnly;
    else if (code === 'BI' || code === 'CD')        suffix = suffixes.frenchOnly;
    else                                            suffix = suffixes.teaching;
    opt.textContent = name + suffix;
  }
}

function renderModalLabels(lang) {
  const t = LABELS[lang] || LABELS.en;
  $('settingsTitle').textContent       = t.settingsTitle;
  $('settingNameLabel').textContent    = t.settingNameLabel;
  $('settingName').placeholder         = t.settingNamePh;
  $('settingEmailLabel').textContent   = t.settingEmailLabel;
  $('settingEmail').placeholder        = t.settingEmailPh;
  $('settingPhoneLabel').textContent   = t.settingPhoneLabel;
  $('settingPhone').placeholder        = t.settingPhonePh;
  $('settingCountryLabel').textContent = t.settingCountryLabel;
  $('settingDistrictLabel').textContent= t.settingDistrictLabel;
  $('districtUnsetOption').textContent = t.districtUnsetText;
  $('districtGroupA').setAttribute('label', t.districtGroupALabel);
  $('districtGroupB').setAttribute('label', t.districtGroupBLabel);
  $('districtGroupC').setAttribute('label', t.districtGroupCLabel);
  $('settingLangLabel').textContent    = t.settingLangLabel;
  $('modalCancelBtn').textContent      = t.modalCancelBtn;
  $('modalSaveBtn').textContent        = t.modalSaveBtn;
  refreshCountryDropdownLabels(lang);
}

function refreshModalCountryWarn() {
  if (!modalPending) return;
  const t = LABELS[modalPending.lang] || LABELS.en;
  const warnEl = $('countryWarn');
  if (isSupportedCountry(modalPending.country)) {
    warnEl.style.display = 'none';
    warnEl.textContent   = '';
  } else {
    const cName = (COUNTRY_DISPLAY[modalPending.lang] && COUNTRY_DISPLAY[modalPending.lang][modalPending.country]) || modalPending.country;
    warnEl.textContent   = t.countryWarn.replace('{country}', cName);
    warnEl.style.display = '';
  }
  refreshDistrictFieldVisibility();
  refreshLanguagePillAvailability();
}

// District is the 30 Rwandan districts; hide the field entirely for
// any other country. Also clears the pending district so Save doesn't
// persist a stale Rwandan district value after the user switched.
function refreshDistrictFieldVisibility() {
  if (!modalPending) return;
  const isRwanda = modalPending.country === 'RW';
  $('settingDistrictField').style.display = isRwanda ? '' : 'none';
  if (!isRwanda) {
    modalPending.district = '';
    $('settingDistrict').value = '';
  }
}

// Country↔language constraint enforcement in the Settings modal.
// Phase A rules:
//   - UG/ZM: English only — disable RW/SW/FR pills, force lang='en'.
//   - BI/CD: French only — disable EN/RW/SW pills, force lang='fr'.
//   - RW/TZ/KE: EN/RW/SW available; FR disabled (no French canonical
//     content for those audiences).
// Called from refreshModalCountryWarn so it fires on modal open and
// on every country-dropdown change.
function refreshLanguagePillAvailability() {
  if (!modalPending) return;
  const enOnly = isEnglishOnlyCountry(modalPending.country);
  const frOnly = isFrenchOnlyCountry(modalPending.country);
  if (enOnly && modalPending.lang !== 'en')      modalPending.lang = 'en';
  else if (frOnly && modalPending.lang !== 'fr') modalPending.lang = 'fr';
  document.querySelectorAll('#settingsModal .lang-pill').forEach(p => {
    const dl = p.dataset.lang;
    let allowed;
    if (enOnly)      allowed = (dl === 'en');
    else if (frOnly) allowed = (dl === 'fr');
    else             allowed = (dl !== 'fr');  // FR only for BI/CD
    if (!allowed) {
      p.classList.add('disabled');
      p.classList.remove('active');
    } else {
      p.classList.remove('disabled');
      p.classList.toggle('active', dl === modalPending.lang);
    }
  });
  if (enOnly || frOnly) renderModalLabels(modalPending.lang);
}

function clearEmailError() {
  $('settingEmailError').textContent = '';
  $('settingEmail').classList.remove('invalid');
}

function showEmailError(msg) {
  $('settingEmailError').textContent = msg;
  $('settingEmail').classList.add('invalid');
}

function saveSettingsModal() {
  if (!modalPending) return;
  const trimmedEmail = (modalPending.email || '').trim();
  const t = LABELS[modalPending.lang] || LABELS.en;
  if (trimmedEmail.length === 0) {
    showEmailError(t.emailRequiredError);
    $('settingEmail').focus();
    return;
  }
  if (!isValidEmail(trimmedEmail)) {
    showEmailError(t.emailInvalidError);
    $('settingEmail').focus();
    return;
  }
  // Commit.
  const prevEmail   = settings.email;
  const prevCountry = settings.country;
  settings = { ...modalPending, email: trimmedEmail };
  activeLang = settings.lang;
  saveSettings();
  closeSettingsModal();
  renderStaticLabels();
  // If email OR country changed, the active conversation may no
  // longer belong to the visible sidebar (chats are filtered by
  // both email and country). Drop back to the welcome state so the
  // user isn't stuck on a chat that's no longer in their list.
  // renderStaticLabels already triggers a fetchChatsList refresh.
  if ((trimmedEmail !== prevEmail || settings.country !== prevCountry)
      && conversationId) {
    setActiveConversation(null);
    clearThreadAndShowWelcome();
  }
}

// ── New chat ────────────────────────────────────────────────────────────────
// Clear the active conversation id so the next message opens a fresh
// row. Clear the thread DOM and restore the welcome empty-state.
function startNewChat() {
  setActiveConversation(null);
  clearThreadAndShowWelcome();
  $('messageInput').focus();
}

function clearEmptyState() {
  const el = $('emptyState');
  if (el) el.remove();
}

function scrollToBottom() {
  const m = $('thread');
  m.scrollTop = m.scrollHeight;
}

function appendUserBubble(text) {
  clearEmptyState();
  const div = document.createElement('div');
  div.className = 'bubble user';
  div.textContent = text;
  $('thread').appendChild(div);
  scrollToBottom();
}

function appendAssistantBubble(payload) {
  clearEmptyState();
  const t = L();
  const div = document.createElement('div');
  div.className = 'bubble assistant';
  // Primary text
  const txt = document.createElement('div');
  txt.textContent = payload.assistantText || '';
  div.appendChild(txt);

  // Meta chips: intent + offline + default-A note
  const metaChips = [];
  if (payload.intent && t.intentBadge[payload.intent]) {
    let chipCls = 'meta-chip';
    if (payload.intent === 'danger') chipCls += ' danger';
    metaChips.push({ cls: chipCls, text: t.intentBadge[payload.intent] });
  }
  if (payload.llmOnline === false) {
    metaChips.push({ cls: 'meta-chip warn', text: t.offlineBadge });
  }
  // Group-A default chip is Rwanda MFT terminology — suppress for
  // any other country (TZ/KE/UG/ZM use the WHO 2024 baseline which
  // has no MFT-style group rotation).
  if (settings.country === 'RW'
      && payload.structured
      && payload.structured.mftContextSource === 'default-group-a') {
    metaChips.push({ cls: 'meta-chip warn', text: activeLang === 'rw' ? 'Itsinda A (ibisanzwe)' : activeLang === 'sw' ? 'Kundi A (chaguo-msingi)' : 'Group A (default)' });
  }
  if (metaChips.length > 0) {
    const row = document.createElement('div');
    row.className = 'meta-row';
    metaChips.forEach(c => {
      const span = document.createElement('span');
      span.className = c.cls;
      span.textContent = c.text;
      row.appendChild(span);
    });
    div.appendChild(row);
  }

  // Structured details (collapsible)
  if (payload.structured) {
    const det = document.createElement('details');
    det.className = 'structured-details';
    const sum = document.createElement('summary');
    sum.textContent = t.structuredDetailsLabel.replace('{endpoint}', payload.structuredEndpoint || 'engine');
    det.appendChild(sum);
    const pre = document.createElement('pre');
    pre.textContent = JSON.stringify(payload.structured, null, 2);
    det.appendChild(pre);
    div.appendChild(det);
  }

  $('thread').appendChild(div);
  scrollToBottom();
}

function appendErrorBubble(text) {
  const div = document.createElement('div');
  div.className = 'bubble system';
  div.textContent = text;
  $('thread').appendChild(div);
  scrollToBottom();
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing-dots';
  div.id = 'typingIndicator';
  div.innerHTML = `${L().typing} <span class="dot"></span><span class="dot"></span><span class="dot"></span>`;
  $('thread').appendChild(div);
  scrollToBottom();
  return div;
}

function removeTyping() {
  const el = $('typingIndicator');
  if (el) el.remove();
}

// ── Send / receive ─────────────────────────────────────────────────────────
async function sendMessage() {
  if (sending) return;
  const input = $('messageInput');
  const text = input.value.trim();
  if (!text) return;

  sending = true;
  $('sendBtn').disabled = true;
  appendUserBubble(text);
  input.value = '';
  input.style.height = 'auto';
  const typingEl = showTyping();

  try {
    const resp = await fetch('/v1/chat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        message:        text,
        lang:           activeLang,
        conversationId: conversationId,
        userName:       settings.userName || '',
        email:          settings.email    || '',
        phone:          settings.phone    || '',
        country:        settings.country  || 'RW',
        district:       settings.district || '',
      }),
    });
    removeTyping();
    if (!resp.ok) {
      appendErrorBubble(L().networkError + ` (HTTP ${resp.status})`);
      return;
    }
    const data = await resp.json();
    if (data.conversationId) {
      const isNew = data.conversationId !== conversationId;
      setActiveConversation(data.conversationId);
      // If this turn opened a new conversation row, refresh the
      // sidebar so the new chat appears. For follow-up turns the
      // existing row's lastActivityAt is bumped — also refresh, so
      // the row floats to the top.
      fetchChatsList();
    }
    if (data.llmOnline === false) {
      $('offlineBadge').textContent = L().offlineBadge;
      $('offlineBadge').style.display = '';
    } else {
      $('offlineBadge').style.display = 'none';
    }
    appendAssistantBubble(data);
  } catch (e) {
    removeTyping();
    appendErrorBubble(L().networkError);
  } finally {
    sending = false;
    $('sendBtn').disabled = false;
    input.focus();
  }
}

// ── Wiring ─────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadSettings();
  // Restore the last active conversation id from localStorage so
  // a refresh keeps the user in the same chat.
  try {
    const persisted = localStorage.getItem(ACTIVE_CONV_KEY);
    if (persisted) conversationId = persisted;
  } catch (e) { /* ignore */ }

  renderStaticLabels();
  // If there's a persisted active chat, replay its messages back
  // into the thread; otherwise the welcome empty-state stays.
  if (conversationId) openChat(conversationId);

  // Chat input / send.
  $('sendBtn').addEventListener('click', sendMessage);
  $('messageInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  $('messageInput').addEventListener('input', (e) => {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 160) + 'px';
  });

  // Chats sidebar buttons.
  $('newChatBtn').addEventListener('click', startNewChat);
  $('openSettingsBtn').addEventListener('click', openSettingsModal);

  // Modal: cancel / save / backdrop click.
  $('modalCancelBtn').addEventListener('click', closeSettingsModal);
  $('modalSaveBtn').addEventListener('click', saveSettingsModal);
  $('settingsModalBackdrop').addEventListener('click', (e) => {
    if (e.target === $('settingsModalBackdrop')) closeSettingsModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modalPending !== null) closeSettingsModal();
  });

  // Modal field handlers — write into modalPending (NOT settings),
  // so a Cancel discards the changes cleanly. Save commits.
  $('settingName').addEventListener('input', (e) => {
    if (modalPending) modalPending.userName = e.target.value;
  });
  $('settingEmail').addEventListener('input', (e) => {
    if (!modalPending) return;
    modalPending.email = e.target.value;
    // Clear the error as the user types; re-validate on Save.
    clearEmailError();
  });
  $('settingPhone').addEventListener('input', (e) => {
    if (modalPending) modalPending.phone = e.target.value;
  });
  $('settingCountry').addEventListener('change', (e) => {
    if (!modalPending) return;
    modalPending.country = e.target.value;
    refreshModalCountryWarn();
  });
  $('settingDistrict').addEventListener('change', (e) => {
    if (modalPending) modalPending.district = e.target.value;
  });

  // Modal language pills — preview labels in modalPending.lang;
  // commit happens on Save.
  document.querySelectorAll('#settingsModal .lang-pill').forEach(p => {
    p.addEventListener('click', () => {
      if (!modalPending) return;
      modalPending.lang = p.dataset.lang;
      document.querySelectorAll('#settingsModal .lang-pill').forEach(el => {
        el.classList.toggle('active', el.dataset.lang === modalPending.lang);
      });
      renderModalLabels(modalPending.lang);
      refreshModalCountryWarn();
    });
  });

  if (!$('messageInput').disabled) $('messageInput').focus();
});
</script>
