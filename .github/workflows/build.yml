name: build

# Verifies MalariaChat compiles against the Abe compiler — parse, type-check, and
# codegen of malariachat.abe (and llm.abe, pulled in via its import). This is the
# source-level "does it build" gate; producing a native binary additionally needs
# the Abe runtime archives + system libs and is done at deploy time, not here.
#
# abec is downloaded from its PUBLIC release repo with no token, so this works on
# forks too. abec enforces licensing: with the ABEC_LICENSE secret (a CI license)
# it compiles silently; without it (e.g. a fork) it falls back to eval grace mode
# — still compiles, just prints an "UNLICENSED EVALUATION" banner.

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  ABEC_RELEASE_TAG: v2026.06.15

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MalariaChat
        uses: actions/checkout@v4

      - name: Download abec (public release, no token)
        run: |
          base="https://github.com/E-Tools-AI-Corporation/abec/releases/download/${ABEC_RELEASE_TAG}"
          curl -fsSL -O "$base/abec-linux-x86_64"
          curl -fsSL -O "$base/SHA256SUMS"
          sha256sum -c SHA256SUMS
          chmod +x abec-linux-x86_64
          mv abec-linux-x86_64 abec
          ./abec --version

      - name: Compile MalariaChat (parse + type-check + codegen)
        env:
          ABEC_LICENSE: ${{ secrets.ABEC_LICENSE }}
        run: |
          ./abec --emit-ll malariachat.abe > /dev/null
          echo "MalariaChat compiles cleanly with abec $ABEC_RELEASE_TAG."
