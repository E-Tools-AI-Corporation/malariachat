name: build

# Verifies MalariaChat compiles against the Abe compiler — parse, type-check, and
# codegen of malariachat.abe (and llm.abe, pulled in via its import). This is the
# source-level "does it build" gate; producing a native binary additionally needs
# the Abe runtime archives + system libs (libpq/hiredis/curl/ssl/argon2) and is
# done at deploy time (see deploy/DEPLOY.md), not in this CI.
#
# abec is a commercial product, distributed as a gated prebuilt binary in the
# private Electronic-Tools-Company/abe repo's Releases. CI DOWNLOADS that binary;
# it never builds the compiler from source. This needs a repository secret
# ABE_REPO_TOKEN (a fine-grained PAT with Contents:read on that repo). Without the
# secret the job skips cleanly (e.g. on forks) instead of failing.

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  ABEC_RELEASE_TAG: abec-2026.06.15

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MalariaChat
        uses: actions/checkout@v4

      - name: Gate on Abe-compiler access
        id: gate
        env:
          ABE_TOKEN: ${{ secrets.ABE_REPO_TOKEN }}
        run: |
          if [ -z "$ABE_TOKEN" ]; then
            echo "::notice::ABE_REPO_TOKEN not set — the Abe compiler is private; skipping the compile gate."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download the abec compiler (gated prebuilt)
        if: steps.gate.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.ABE_REPO_TOKEN }}
        run: |
          gh release download "$ABEC_RELEASE_TAG" \
            -R Electronic-Tools-Company/abe \
            -p abec-linux-x86_64 -p SHA256SUMS
          sha256sum -c SHA256SUMS
          chmod +x abec-linux-x86_64
          mv abec-linux-x86_64 abec
          ./abec --version

      - name: Compile MalariaChat (parse + type-check + codegen)
        if: steps.gate.outputs.skip == 'false'
        run: |
          ./abec --emit-ll malariachat.abe > /dev/null
          echo "MalariaChat compiles cleanly with $ABEC_RELEASE_TAG."
